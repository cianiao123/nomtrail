name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tencent-cloud-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$TENCENT_SSH_KEY" > ~/.ssh/tencent_deploy_key
          chmod 600 ~/.ssh/tencent_deploy_key
          ssh-keyscan -H "$TENCENT_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${TENCENT_USER:-ubuntu}"
          ssh -i ~/.ssh/tencent_deploy_key "${DEPLOY_USER}@${TENCENT_HOST}" <<'EOF'
            set -euo pipefail
            cd /var/www/travel-planner
            git pull --ff-only origin main
            npm ci
            npm run build
            if pm2 describe travel-planner > /dev/null; then
              npm run pm2:restart
            else
              npm run pm2:start
            fi
            pm2 save
          EOF
