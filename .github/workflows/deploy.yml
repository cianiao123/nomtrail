name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tencent-cloud-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
        run: |
          set -euo pipefail
          DEPLOY_HOST="$(printf '%s' "$TENCENT_HOST" | tr -d '[:space:]')"
          DEPLOY_HOST="${DEPLOY_HOST#http://}"
          DEPLOY_HOST="${DEPLOY_HOST#https://}"
          DEPLOY_HOST="${DEPLOY_HOST#*@}"
          DEPLOY_HOST="${DEPLOY_HOST%%/*}"
          if [ -z "$DEPLOY_HOST" ]; then
            echo "TENCENT_HOST is empty after normalization"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$TENCENT_SSH_KEY" > ~/.ssh/tencent_deploy_key
          chmod 600 ~/.ssh/tencent_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
        run: |
          set -euo pipefail
          DEPLOY_HOST="$(printf '%s' "$TENCENT_HOST" | tr -d '[:space:]')"
          DEPLOY_HOST="${DEPLOY_HOST#http://}"
          DEPLOY_HOST="${DEPLOY_HOST#https://}"
          DEPLOY_HOST="${DEPLOY_HOST#*@}"
          DEPLOY_HOST="${DEPLOY_HOST%%/*}"
          DEPLOY_USER="$(printf '%s' "${TENCENT_USER:-ubuntu}" | tr -d '[:space:]')"
          DEPLOY_USER="${DEPLOY_USER%@*}"
          if [ -z "$DEPLOY_HOST" ]; then
            echo "TENCENT_HOST is empty after normalization"
            exit 1
          fi
          if [ -z "$DEPLOY_USER" ]; then
            DEPLOY_USER="ubuntu"
          fi
          echo "Deploying to ${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -i ~/.ssh/tencent_deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
            set -euo pipefail
            cd /var/www/travel-planner
            git pull --ff-only origin main
            npm ci
            npm run build
            if pm2 describe travel-planner > /dev/null; then
              npm run pm2:restart
            else
              npm run pm2:start
            fi
            pm2 save
          EOF
